<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synthesis Engine</title>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-grey: #1C1C1E;
        }
        body {
            background-color: black;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            text-align: center;
        }
        .gate-container {
            width: 80%;
            max-width: 350px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
        }
        h1 { font-weight: 600; letter-spacing: -0.5px; }
        input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 15px;
            color: white;
            text-align: center;
            font-size: 16px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background-color: var(--ios-blue);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.97); opacity: 0.8; }
        .logo { font-size: 50px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="gate-container">
        <div class="logo">🧠</div>
        <h1>Synthesis Engine</h1>
        <p style="color: #8E8E93;">Secure Clinical Environment</p>
        <input type="password" id="pass" placeholder="Access Key">
        <button onclick="login()">Enter Engine</button>
    </div>

    <script>
        function login() {
            const key = document.getElementById('pass').value;
            if(key === "Synthesis2026") {
                window.location.href = "http://localhost:8501";
            } else {
                alert("Incorrect Access Key");
            }
        }
    </script>
</body>
</html>
