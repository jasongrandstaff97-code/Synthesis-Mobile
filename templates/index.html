\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthesis Council | Dashboard</title>
    <style>
        :root { --neon-green: #00ffaa; --bg-dark: #0f0f0f; --card-bg: #1a1a1a; }
        body { background: var(--bg-dark); color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Input Section */
        .input-area { background: var(--card-bg); padding: 25px; border-radius: 12px; border-left: 6px solid var(--neon-green); margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 100px; background: #252525; color: white; border: 1px solid #333; border-radius: 8px; padding: 15px; font-size: 16px; box-sizing: border-box; resize: none; }
        button { background: var(--neon-green); color: black; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; font-size: 18px; transition: 0.3s; }
        button:hover { background: #00cc88; transform: translateY(-2px); }

        /* Results Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #333; min-height: 200px; transition: 0.3s; }
        .card h3 { color: var(--neon-green); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .full-width { grid-column: span 2; }
        
        /* Nano Banano Specialized Section */
        .visual-card { background: #111; border: 1px solid #ffcc00; }
        .visual-card h3 { color: #ffcc00; }
        .content { line-height: 1.6; color: #bbb; white-space: pre-wrap; }
        
        /* Loading Animation */
        .loading { color: var(--neon-green); font-style: italic; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="color: var(--neon-green); letter-spacing: 2px;">SYNTHESIS COUNCIL</h1>
            <p style="color: #888;">Multi-Agent Intelligence Deliberation</p>
        </header>

        <div class="input-area">
            <textarea id="prompt" placeholder="Input your thesis or problem for the Council to review..."></textarea>
            <button id="activate-btn" onclick="activate()">ACTIVATE COUNCIL 🔥</button>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Visionary Agent</h3>
                <div id="v" class="content">Waiting for input...</div>
            </div>
            <div class="card">
                <h3>Skeptic Agent</h3>
                <div id="s" class="content">Waiting for input...</div>
            </div>
            <div class="card full-width">
                <h3>The Final Verdict (Judge)</h3>
                <div id="j" class="content">Waiting for deliberation...</div>
            </div>
            <div class="card full-width visual-card">
                <h3>🎨 NANO BANANO PROMPT (Visualist)</h3>
                <div id="a" class="content" style="font-family: 'Courier New', Courier, monospace;">Waiting for synthesis...</div>
            </div>
        </div>
    </div>

    <script>
        async function activate() {
            const promptInput = document.getElementById('prompt').value;
            if (!promptInput) return alert("Please enter a prompt.");

            // Set loading state
            const boxes = ['v', 's', 'j', 'a'];
            boxes.forEach(id => {
                document.getElementById(id).innerHTML = '<span class="loading">Council is deliberating...</span>';
            });

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptInput })
                });

                if (!response.ok) throw new Error("Council connection failed.");

                const data = await response.json();

                // These keys match the Python return labels exactly
                document.getElementById('v').innerText = data.visionary;
                document.getElementById('s').innerText = data.skeptic;
                document.getElementById('j').innerText = data
} catch (error) {
                console.error("Error:", error);
                alert("The Council encountered an error. Check terminal for details.");
            }
        }
    </script>
</body>
</html>
